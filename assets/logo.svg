<svg xmlns="http://www.w3.org/2000/svg" width="860" height="260" viewBox="0 0 860 260" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ff5a5a"/>
      <stop offset="20%" stop-color="#ffb14e"/>
      <stop offset="40%" stop-color="#f7e359"/>
      <stop offset="60%" stop-color="#4ade80"/>
      <stop offset="80%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- terminal card -->
  <rect x="2" y="2" width="856" height="256" rx="22" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <!-- window dots -->
  <circle cx="34" cy="34" r="6" fill="#ff5f56"/>
  <circle cx="56" cy="34" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="34" r="6" fill="#27c93f"/>

  <!-- shiny rainbow cat -->
  <text x="70" y="135" font-size="40" font-weight="700" fill="url(#rainbow)" xml:space="preserve" letter-spacing="2"> /\_/\</text>
  <text x="70" y="178" font-size="40" font-weight="700" fill="url(#rainbow)" xml:space="preserve" letter-spacing="2">( ^.^ )</text>
  <text x="70" y="221" font-size="40" font-weight="700" fill="url(#rainbow)" xml:space="preserve" letter-spacing="2"> &gt; ^ &lt;</text>

  <!-- wordmark -->
  <text x="330" y="120" font-size="72" font-weight="800" fill="#e6edf3">ccgotchi</text>
  <text x="334" y="158" font-size="21" fill="#8b949e">a Tamagotchi for your Claude Code statusline</text>

  <!-- usage bar motif -->
  <text x="334" y="208" font-size="26" letter-spacing="3" xml:space="preserve"><tspan fill="#4ade80">●●●</tspan><tspan fill="#f7e359">●●●●●</tspan><tspan fill="#ff5a5a">●</tspan><tspan fill="#30363d">○</tspan></text>
  <text x="610" y="208" font-size="20" fill="#8b949e">ctx 91%</text>
</svg>
