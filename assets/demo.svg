<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="340" viewBox="0 0 1060 340" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <!-- terminal window -->
  <rect x="2" y="2" width="1056" height="336" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <!-- title bar -->
  <rect x="2" y="2" width="1056" height="40" rx="14" fill="#161b22"/>
  <rect x="2" y="24" width="1056" height="18" fill="#161b22"/>
  <circle cx="28" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="22" r="6" fill="#27c93f"/>
  <text x="530" y="27" text-anchor="middle" font-size="14" fill="#8b949e">✳ claude — ~/project</text>

  <!-- faux session -->
  <text x="26" y="92" font-size="16" fill="#6e7681">❯ explain the cache layer</text>
  <text x="26" y="122" font-size="16" fill="#8b949e">⏺ It reads the config files and renders a single statusline…</text>

  <!-- the ccgotchi statusline: model name (leftmost) · 5h · 7d · ctx, then the pet -->
  <text x="26" y="226" font-size="16" xml:space="preserve"><tspan fill="#e6edf3" font-weight="700">Opus 4.8</tspan><tspan fill="#6e7681">  ·  </tspan><tspan fill="#c9d1d9">5h </tspan><tspan fill="#3fb950">●●</tspan><tspan fill="#484f58">○○○○○○○○</tspan><tspan fill="#c9d1d9"> 22% </tspan><tspan fill="#6e7681">2h8m</tspan><tspan fill="#6e7681">  ·  </tspan><tspan fill="#c9d1d9">7d </tspan><tspan fill="#d29922">●●●●●●</tspan><tspan fill="#484f58">○○○○</tspan><tspan fill="#c9d1d9"> 63% </tspan><tspan fill="#6e7681">1d19h</tspan><tspan fill="#6e7681">  ·  </tspan><tspan fill="#c9d1d9">ctx </tspan><tspan fill="#3fb950">●●●●</tspan><tspan fill="#484f58">○○○○○○</tspan><tspan fill="#c9d1d9"> 40%</tspan></text>

  <!-- the pet, right-aligned. health = 100 - worst window (63%) → yellow / content -->
  <text x="952" y="226" font-size="16" fill="#d29922" xml:space="preserve"> /\_/\</text>
  <text x="952" y="250" font-size="16" fill="#d29922" xml:space="preserve">( o.o )</text>
  <text x="952" y="274" font-size="16" fill="#d29922" xml:space="preserve"> &gt; ^ &lt;</text>

  <!-- prompt -->
  <text x="26" y="312" font-size="16" xml:space="preserve"><tspan fill="#3fb950">❯ </tspan><tspan fill="#c9d1d9">▌</tspan></text>
</svg>
