name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin=ccgotchi
          [ "${{ matrix.os }}" = "windows-latest" ] && bin=ccgotchi.exe
          tar -czf ccgotchi-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release "$bin"
      - uses: softprops/action-gh-release@v2
        with:
          files: ccgotchi-${{ matrix.target }}.tar.gz
