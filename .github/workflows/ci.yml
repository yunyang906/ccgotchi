name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # core + CLI only — the Tauri tray app needs GTK/WebKit system libs and is
      # built/packaged on macOS via package_macos.sh, not in CI.
      - run: cargo test -p ccgotchi
      - run: cargo build --release -p ccgotchi
